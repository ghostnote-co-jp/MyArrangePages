<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyArrange ダウンロード</title>

  <!-- OGP / X Card（Xでシェアした時に表示される） -->
  <meta property="og:title" content="アプリ名をダウンロード">
  <meta property="og:description" content="App Store / Google Play で今すぐダウンロード">
  <meta property="og:image" content="https://your-username.github.io/your-repo/ogp.png">
  <meta property="og:url" content="https://your-username.github.io/your-repo/">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      color: #aaa;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-ios {
      background: #000;
      color: #fff;
      border: 1px solid #333;
    }
    .btn-android {
      background: #01875f;
      color: #fff;
    }
    .redirecting {
      color: #888;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚀</div>
    <h1>アプリ名</h1>
    <p>iOSまたはAndroidをお使いの方は、<br>各ストアからダウンロードできます。</p>

    <a href="YOUR_APP_STORE_URL" class="btn btn-ios" id="btn-ios">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      App Store でダウンロード
    </a>

    <a href="YOUR_GOOGLE_PLAY_URL" class="btn btn-android" id="btn-android">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.3.17.64.22.99.14l12.12-6.99-2.54-2.54-10.57 9.39zm-1.81-20.8C1.13 3.33 1 3.7 1 4.1v15.8c0 .4.13.77.37 1.06l.06.06 8.85-8.85v-.2L1.43 3.02l-.06.06-.06-.12zM20.34 10.23l-2.43-1.4-2.85 2.85 2.85 2.85 2.46-1.42c.7-.4.7-1.47-.03-1.88zM4.17.24L16.29 7.23l-2.54 2.54L3.18.38C3.48.3 3.87.09 4.17.24z"/></svg>
      Google Play でダウンロード
    </a>

    <p class="redirecting" id="redirect-msg"></p>
  </div>

  <script>
    // ============================================================
    // 設定：ここだけ変更してください
    // ============================================================
    const CONFIG = {
      appStoreUrl:   'YOUR_APP_STORE_URL',    // 例: https://apps.apple.com/jp/app/xxx/id000000000
      googlePlayUrl: 'YOUR_GOOGLE_PLAY_URL',  // 例: https://play.google.com/store/apps/details?id=com.example.app
      fallbackUrl:   '',                       // PC等のフォールバック（空欄=このページを表示）
      autoRedirectMs: 1500,                    // 自動リダイレクトまでの時間(ms)。0で無効
    };
    // ============================================================

    (function() {
      const ua = navigator.userAgent;
      const isIOS     = /iPhone|iPad|iPod/i.test(ua);
      const isAndroid = /Android/i.test(ua);

      function redirect(url, label) {
        if (!url || url.startsWith('YOUR_')) return; // 未設定なら何もしない
        const msg = document.getElementById('redirect-msg');
        if (msg) msg.textContent = label + ' に移動しています...';
        if (CONFIG.autoRedirectMs > 0) {
          setTimeout(() => { window.location.href = url; }, CONFIG.autoRedirectMs);
        } else {
          window.location.href = url;
        }
      }

      if (isIOS) {
        redirect(CONFIG.appStoreUrl, 'App Store');
      } else if (isAndroid) {
        redirect(CONFIG.googlePlayUrl, 'Google Play');
      } else if (CONFIG.fallbackUrl) {
        redirect(CONFIG.fallbackUrl, 'サイト');
      }
      // それ以外 → このページをそのまま表示（ボタン付きLP）
    })();
  </script>
</body>
</html>
